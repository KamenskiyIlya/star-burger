services:
  frontend:
    build: ./frontend
    ports:
      - "1234:1234"
    volumes:
      - ./frontend/src:/app/src

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DB_URL=postgres://starburger:starburger@db:5432/starburger
    depends_on:
      - db

  db:
    image: postgres:18.4
    environment:
      - POSTGRES_DB=starburger
      - POSTGRES_USER=starburger
      - POSTGRES_PASSWORD=starburger
    ports:
      - "5433:5432"
    